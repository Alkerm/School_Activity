<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dream Job Booth</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="screen active">
            <div class="header">
                <h1>Admin Panel</h1>
                <p>View users, usage, and add trials.</p>
            </div>

            <div class="auth-box">
                <input type="password" id="admin-key" class="auth-input" placeholder="Enter admin key">
                <div class="controls">
                    <button id="load-users-btn" class="btn btn-primary">Load Users</button>
                    <button id="refresh-users-btn" class="btn btn-secondary">Refresh</button>
                </div>
                <p id="admin-message" class="auth-message"></p>
            </div>

            <div class="admin-add-box" id="admin-add-box" style="display: none;">
                <input type="email" id="target-email" class="auth-input" placeholder="User email">
                <input type="number" id="add-uses" class="auth-input" min="1" placeholder="Trials to add">
                <button id="add-trials-btn" class="btn btn-primary">Add Trials</button>
            </div>

            <div class="admin-table-wrap">
                <table class="admin-table" id="users-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Email</th>
                            <th>Used</th>
                            <th>Total</th>
                            <th>Remaining</th>
                            <th>Created</th>
                            <th>Last Login</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="/static/admin.js"></script>
</body>
</html>
